<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Query Model — Mapa de Situación</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0B1215;
  --bg2: #0F1A1E;
  --surface: #131F24;
  --surface2: #182830;
  --green: #00ED64;
  --green-dim: #00684A;
  --green-glow: rgba(0,237,100,0.08);
  --blue: #4DA6FF;
  --blue-dim: #1A3A5C;
  --orange: #FF9F43;
  --red: #FF6B6B;
  --white: #E8ECEE;
  --gray: #6B7D85;
  --gray-lt: #8FA3AC;
  --line: rgba(255,255,255,0.04);
  --serif: 'Instrument Serif', Georgia, serif;
  --sans: 'DM Sans', sans-serif;
  --mono: 'IBM Plex Mono', monospace;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--white);
  font-family: var(--sans);
  -webkit-font-smoothing: antialiased;
}

/* Grain */
body::after {
  content: '';
  position: fixed; inset: 0;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)' opacity='0.025'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 10000;
}

/* Grid */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(90deg, var(--line) 1px, transparent 1px),
    linear-gradient(var(--line) 1px, transparent 1px);
  background-size: 80px 80px;
  pointer-events: none; z-index: 1; opacity: 0.4;
}

/* Nav */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  padding: 0.9rem 2.5rem;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(11,18,21,0.92);
  backdrop-filter: blur(24px) saturate(1.2);
  border-bottom: 1px solid var(--line);
}
.nav-brand { font-family: var(--mono); font-size: 0.72rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gray); }
.nav-brand em { color: var(--green); font-style: normal; }
.nav-center { font-family: var(--serif); font-size: 0.95rem; color: var(--white); font-style: italic; }
.nav-tag { font-family: var(--mono); font-size: 0.6rem; font-weight: 500; color: var(--green-dim); letter-spacing: 0.1em; text-transform: uppercase; border: 1px solid rgba(0,237,100,0.15); padding: 0.25rem 0.6rem; border-radius: 3px; }

/* ===== MINDMAP CONTAINER ===== */
.mindmap {
  position: fixed;
  inset: 0;
  top: 52px;
  z-index: 2;
  overflow: hidden;
}

/* SVG connections layer */
.connections {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
  pointer-events: none;
}
.conn-path {
  fill: none;
  stroke-width: 1.2;
  stroke-dasharray: 500;
  stroke-dashoffset: 500;
  opacity: 0.6;
  transition: opacity 0.5s;
}
.conn-path.drawn { animation: drawPath 1s cubic-bezier(0.16,1,0.3,1) forwards; }
@keyframes drawPath { to { stroke-dashoffset: 0; } }

.conn-glow {
  fill: none;
  stroke-width: 4;
  opacity: 0;
  filter: blur(4px);
  transition: opacity 0.5s;
}
.conn-glow.drawn { animation: glowIn 1s ease 0.5s forwards; }
@keyframes glowIn { to { opacity: 0.15; } }

/* ===== CENTER NODE ===== */
.center-node {
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%) scale(0);
  z-index: 10;
  text-align: center;
  cursor: pointer;
  transition: transform 0.5s cubic-bezier(0.16,1,0.3,1), filter 0.3s;
}
.center-node.visible { transform: translate(-50%, -50%) scale(1); }
.center-node:hover { filter: drop-shadow(0 0 20px rgba(0,237,100,0.2)); }

.center-ring {
  width: 180px; height: 180px;
  border-radius: 50%;
  border: 1.5px solid var(--green);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column;
  background: radial-gradient(circle, rgba(0,237,100,0.06) 0%, transparent 70%);
  position: relative;
}
.center-ring::before {
  content: '';
  position: absolute; inset: -6px;
  border-radius: 50%;
  border: 1px solid var(--green);
  opacity: 0;
  animation: centerPulse 3s ease-in-out infinite;
}
@keyframes centerPulse {
  0%, 100% { opacity: 0; transform: scale(1); }
  50% { opacity: 0.2; transform: scale(1.08); }
}
.center-ring h1 {
  font-family: var(--serif);
  font-size: 1.15rem;
  font-weight: 400;
  color: var(--green);
  line-height: 1.2;
}
.center-ring p {
  font-family: var(--mono);
  font-size: 0.55rem;
  color: var(--gray);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-top: 0.4rem;
}

/* ===== BRANCH NODES ===== */
.branch {
  position: absolute;
  z-index: 5;
  opacity: 0;
  transform: scale(0.8);
  transition: opacity 0.6s cubic-bezier(0.16,1,0.3,1), transform 0.6s cubic-bezier(0.16,1,0.3,1), filter 0.3s;
  cursor: pointer;
  display: flex;
  flex-direction: column;
}
.branch.expand-up {
  flex-direction: column-reverse;
}
.branch.visible { opacity: 1; transform: scale(1); }
.branch.dimmed { opacity: 0.2; filter: blur(1px); pointer-events: none; }
.branch.focused { z-index: 20; }

.branch-head {
  padding: 0.9rem 1.3rem;
  border-radius: 10px;
  background: var(--surface);
  border: 1px solid var(--line);
  transition: border-color 0.3s, box-shadow 0.3s, transform 0.3s;
  min-width: 160px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.branch-head::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
}
.branch:hover .branch-head,
.branch.focused .branch-head {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.3);
}
.branch-head .label {
  font-family: var(--mono);
  font-size: 0.55rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 0.3rem;
}
.branch-head h3 {
  font-family: var(--serif);
  font-size: 0.95rem;
  font-weight: 400;
  color: var(--white);
  line-height: 1.25;
}

/* Branch colors */
.branch[data-color="green"] .branch-head { border-color: rgba(0,237,100,0.15); }
.branch[data-color="green"] .branch-head::before { background: var(--green); }
.branch[data-color="green"] .branch-head .label { color: var(--green); }
.branch[data-color="green"]:hover .branch-head,
.branch[data-color="green"].focused .branch-head { border-color: rgba(0,237,100,0.3); }

.branch[data-color="blue"] .branch-head { border-color: rgba(77,166,255,0.15); }
.branch[data-color="blue"] .branch-head::before { background: var(--blue); }
.branch[data-color="blue"] .branch-head .label { color: var(--blue); }
.branch[data-color="blue"]:hover .branch-head,
.branch[data-color="blue"].focused .branch-head { border-color: rgba(77,166,255,0.3); }

.branch[data-color="orange"] .branch-head { border-color: rgba(255,159,67,0.15); }
.branch[data-color="orange"] .branch-head::before { background: var(--orange); }
.branch[data-color="orange"] .branch-head .label { color: var(--orange); }
.branch[data-color="orange"]:hover .branch-head,
.branch[data-color="orange"].focused .branch-head { border-color: rgba(255,159,67,0.3); }

.branch[data-color="red"] .branch-head { border-color: rgba(255,107,107,0.15); }
.branch[data-color="red"] .branch-head::before { background: var(--red); }
.branch[data-color="red"] .branch-head .label { color: var(--red); }
.branch[data-color="red"]:hover .branch-head,
.branch[data-color="red"].focused .branch-head { border-color: rgba(255,107,107,0.3); }

/* ===== SUB-ITEMS (expand on click) ===== */
.branch-items {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.5s cubic-bezier(0.16,1,0.3,1), opacity 0.4s;
  opacity: 0;
  margin-top: 0;
}
.branch.focused .branch-items {
  max-height: 300px;
  opacity: 1;
  margin-top: 0.6rem;
}
.branch.expand-up .branch-items { margin-top: 0; }
.branch.expand-up.focused .branch-items { margin-top: 0; margin-bottom: 0.6rem; }
.branch-item {
  display: flex;
  gap: 0.5rem;
  align-items: baseline;
  padding: 0.4rem 0.6rem;
  border-radius: 6px;
  background: var(--surface);
  border: 1px solid var(--line);
  margin-bottom: 0.3rem;
  opacity: 0;
  transform: translateY(6px);
  transition: opacity 0.4s, transform 0.4s;
}
.branch.focused .branch-item {
  opacity: 1;
  transform: translateY(0);
}
.branch.focused .branch-item:nth-child(1) { transition-delay: 0.1s; }
.branch.focused .branch-item:nth-child(2) { transition-delay: 0.18s; }
.branch.focused .branch-item:nth-child(3) { transition-delay: 0.26s; }
.branch.focused .branch-item:nth-child(4) { transition-delay: 0.34s; }

.branch-item .dot {
  width: 4px; height: 4px;
  border-radius: 50%;
  margin-top: 0.35rem;
  flex-shrink: 0;
}
.branch[data-color="green"] .branch-item .dot { background: var(--green); box-shadow: 0 0 6px rgba(0,237,100,0.5); }
.branch[data-color="blue"] .branch-item .dot { background: var(--blue); box-shadow: 0 0 6px rgba(77,166,255,0.5); }
.branch[data-color="orange"] .branch-item .dot { background: var(--orange); box-shadow: 0 0 6px rgba(255,159,67,0.5); }
.branch[data-color="red"] .branch-item .dot { background: var(--red); box-shadow: 0 0 6px rgba(255,107,107,0.5); }

.branch-item p {
  font-size: 0.72rem;
  color: var(--gray-lt);
  line-height: 1.4;
  max-width: 260px;
}

/* ===== LEGEND ===== */
.legend {
  position: fixed;
  bottom: 1.5rem;
  right: 2rem;
  display: flex;
  gap: 1.2rem;
  z-index: 100;
  opacity: 0;
  transition: opacity 0.8s;
}
.legend.visible { opacity: 1; }
.legend-item {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  font-family: var(--mono);
  font-size: 0.52rem;
  color: var(--gray);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.legend-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
}

/* ===== HINT ===== */
.hint {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%);
  font-family: var(--mono);
  font-size: 0.6rem;
  color: var(--gray);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  z-index: 100;
  opacity: 0;
  transition: opacity 0.8s;
  display: flex;
  align-items: center;
  gap: 0.6rem;
}
.hint.visible { opacity: 1; }
.hint .pulse {
  width: 6px; height: 6px;
  background: var(--green);
  border-radius: 50%;
  animation: hintPulse 2s ease infinite;
}
@keyframes hintPulse { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }

/* ===== TRAVEL DOTS ===== */
@keyframes travelDot {
  0% { offset-distance: 0%; opacity: 0; }
  10% { opacity: 0.8; }
  85% { opacity: 0.8; }
  100% { offset-distance: 100%; opacity: 0; }
}

/* ===== RESPONSIVE ===== */
@media (max-width: 1100px) {
  .center-ring { width: 140px; height: 140px; }
  .center-ring h1 { font-size: 0.95rem; }
  .branch-head { min-width: 130px; padding: 0.7rem 1rem; }
  .branch-head h3 { font-size: 0.85rem; }
}
</style>
</head>
<body>
<script src="auth-guard.js"></script>

<nav>

<div class="mindmap" id="mindmap">

<div class="legend" id="legend">

<div class="hint" id="hint">

const COLORS = {
  green: '#00ED64',
  blue: '#4DA6FF',
  orange: '#FF9F43',
  red: '#FF6B6B'
};

const mindmap = document.getElementById('mindmap');
const svg = document.getElementById('connections');
const centerNode = document.getElementById('centerNode');
const hint = document.getElementById('hint');
let focusedBranch = null;

// Create branch DOM elements
BRANCHES.forEach((b, i) => {
  const div = document.createElement('div');
  div.className = 'branch';
  div.dataset.id = b.id;
  div.dataset.color = b.color;
  div.style.left = b.pos.x + '%';
  div.style.top = b.pos.y + '%';
  div.style.transform = 'translate(-50%, -50%) scale(0.8)';
  if (b.pos.y > 50) div.classList.add('expand-up');

  div.innerHTML = `
    <div class="branch-head">
      <div class="label">${b.label}</div>
      <h3>${b.title}</h3>
    </div>
    <div class="branch-items">
      ${b.items.map(item => `
        <div class="branch-item">
          <div class="dot"></div>
          <p>${item}</p>
        </div>
      `).join('')}
    </div>
  `;

  div.addEventListener('click', (e) => {
    e.stopPropagation();
    toggleFocus(b.id);
  });

  mindmap.appendChild(div);
});

// Draw SVG connections
function drawConnections() {
  const rect = mindmap.getBoundingClientRect();
  const cx = rect.width * 0.5;
  const cy = (rect.height * 0.5);

  svg.setAttribute('viewBox', `0 0 ${rect.width} ${rect.height}`);
  svg.innerHTML = '';

  // Defs for glow filter and dot
  const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
  defs.innerHTML = `
    <filter id="connGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  `;
  svg.appendChild(defs);

  BRANCHES.forEach((b, i) => {
    const bx = rect.width * (b.pos.x / 100);
    const by = rect.height * (b.pos.y / 100);

    // Control point for bezier (pull toward center)
    const mx = (cx + bx) / 2;
    const my = (cy + by) / 2;
    // Offset control point perpendicular for a nice curve
    const dx = bx - cx;
    const dy = by - cy;
    const len = Math.sqrt(dx*dx + dy*dy);
    const nx = -dy / len * 30;
    const ny = dx / len * 30;
    const qx = mx + nx;
    const qy = my + ny;

    const pathD = `M ${cx} ${cy} Q ${qx} ${qy} ${bx} ${by}`;
    const color = COLORS[b.color];

    // Glow path
    const glow = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    glow.setAttribute('d', pathD);
    glow.setAttribute('stroke', color);
    glow.setAttribute('class', 'conn-glow');
    glow.dataset.branch = b.id;
    svg.appendChild(glow);

    // Main path
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', pathD);
    path.setAttribute('stroke', color);
    path.setAttribute('class', 'conn-path');
    path.setAttribute('id', 'path-' + b.id);
    path.dataset.branch = b.id;
    // Measure actual path length for accurate dash
    svg.appendChild(path);
    const pathLen = path.getTotalLength();
    path.style.strokeDasharray = pathLen;
    path.style.strokeDashoffset = pathLen;

    // Traveling dot
    const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    dot.setAttribute('r', '2.5');
    dot.setAttribute('fill', color);
    dot.setAttribute('filter', 'url(#connGlow)');
    dot.dataset.branch = b.id;
    dot.style.offsetPath = `path('${pathD}')`;
    dot.style.offsetRotate = '0deg';
    dot.style.animation = `travelDot 2.5s ease-in-out ${i * 0.4}s infinite`;
    svg.appendChild(dot);
  });
}

// Entrance animation sequence
function animateEntrance() {
  // 1. Center node
  setTimeout(() => centerNode.classList.add('visible'), 300);

  // 2. Draw connections
  setTimeout(() => {
    drawConnections();
    svg.querySelectorAll('.conn-path').forEach((p, i) => {
      setTimeout(() => p.classList.add('drawn'), i * 150);
    });
    svg.querySelectorAll('.conn-glow').forEach((p, i) => {
      setTimeout(() => p.classList.add('drawn'), i * 150);
    });
  }, 600);

  // 3. Show branches
  const branches = document.querySelectorAll('.branch');
  setTimeout(() => {
    branches.forEach((b, i) => {
      setTimeout(() => {
        b.classList.add('visible');
        b.style.transform = 'translate(-50%, -50%) scale(1)';
      }, i * 120);
    });
  }, 900);

  // 4. Show hint + legend
  setTimeout(() => {
    hint.classList.add('visible');
    document.getElementById('legend').classList.add('visible');
  }, 2400);
}

// Focus/unfocus a branch
function toggleFocus(id) {
  const branches = document.querySelectorAll('.branch');
  const paths = svg.querySelectorAll('.conn-path, .conn-glow, circle[data-branch]');

  if (focusedBranch === id) {
    // Unfocus: reset all
    focusedBranch = null;
    branches.forEach(b => {
      b.classList.remove('focused', 'dimmed');
    });
    paths.forEach(p => {
      p.style.opacity = '';
    });
    hint.querySelector('span').textContent = 'Haz clic en una rama para explorar — clic en el centro para resetear';
    return;
  }

  focusedBranch = id;
  branches.forEach(b => {
    if (b.dataset.id === id) {
      b.classList.add('focused');
      b.classList.remove('dimmed');
    } else {
      b.classList.remove('focused');
      b.classList.add('dimmed');
    }
  });
  paths.forEach(p => {
    p.style.opacity = p.dataset.branch === id ? '' : '0.08';
  });
  hint.querySelector('span').textContent = 'Clic en la rama activa o en el centro para volver al mapa completo';
}

// Center node click resets
centerNode.addEventListener('click', () => {
  if (focusedBranch) toggleFocus(focusedBranch);
});

// Keyboard: Escape resets
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && focusedBranch) toggleFocus(focusedBranch);
});

// Resize handler
window.addEventListener('resize', () => {
  drawConnections();
  // Re-apply drawn state
  svg.querySelectorAll('.conn-path').forEach(p => p.classList.add('drawn'));
  svg.querySelectorAll('.conn-glow').forEach(p => p.classList.add('drawn'));
});

// Start
animateEntrance();
</script>
